name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      dynamo_ref:
        description: "Override ai-dynamo ref (defaults to .github/dynamo-ref.txt)"
        required: false
        default: ""

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow, github.event.pull_request.number) || format('{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pre-commit:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1
        timeout-minutes: 5

  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Generous timeout -- git-ref runs compile ai-dynamo-runtime from
    # source, which takes ~5 min uncached; PyPI-mode runs finish in under
    # a minute; fully warm caches bring git runs down to ~1 min.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          # Not using setup-python's `cache: pip` -- we key our pip cache
          # below on the resolved ai-dynamo SHA so moving refs like `main`
          # invalidate correctly when upstream advances.

      - name: Resolve ai-dynamo ref
        id: resolve
        # Outputs:
        #   ref  -- the raw ref (branch/SHA/version/empty) as the user/file supplied.
        #   sha  -- immutable identifier for cache keying: branches/tags are
        #           resolved via `git ls-remote`; PyPI versions and empty
        #           pass through unchanged.
        #   kind -- empty | pypi | git  (gates the git-only cache + apt steps).
        run: |
          ref="${{ github.event.inputs.dynamo_ref }}"
          if [ -z "$ref" ]; then
            ref=$(tr -d '[:space:]' < .github/dynamo-ref.txt)
          fi
          if [ -z "$ref" ]; then
            kind=empty
            sha=""
          elif echo "$ref" | grep -Eq '^v?[0-9]+\.[0-9]+'; then
            kind=pypi
            sha="$ref"
          else
            kind=git
            sha=$(git ls-remote https://github.com/ai-dynamo/dynamo.git "$ref" \
                  | awk '{print $1}' | head -1)
            # `git ls-remote` returns nothing for a full SHA -- fall back to the ref itself.
            [ -z "$sha" ] && sha="$ref"
          fi
          echo "Using ai-dynamo ref='$ref' kind=$kind sha=$sha"
          {
            echo "ref=$ref"
            echo "sha=$sha"
            echo "kind=$kind"
          } >> "$GITHUB_OUTPUT"

      - name: Cache Rust toolchain + cargo registry
        if: steps.resolve.outputs.kind == 'git'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          # Shared across the Python matrix -- cargo artefacts are Python-ABI
          # independent. Per-SHA key so upstream moves invalidate; restore
          # from any previous dynamo-rust- cache to warm incremental compiles.
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            ~/.rustup
          key: dynamo-rust-${{ runner.os }}-${{ steps.resolve.outputs.sha }}
          restore-keys: |
            dynamo-rust-${{ runner.os }}-

      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          # Keyed on Python version (wheels are ABI-specific), resolved SHA
          # (so git+...@SHA URL → wheel cache hits exactly), and pyproject
          # hash (so dep changes invalidate). `kind` is folded in so PyPI
          # and git runs don't clobber each other's wheel cache entries.
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ steps.resolve.outputs.kind }}-${{ steps.resolve.outputs.sha }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-${{ steps.resolve.outputs.kind }}-

      - name: Install system deps for ai-dynamo-runtime builds
        # Only needed for git mode. PyPI wheels don't require clang/cmake/protoc.
        if: steps.resolve.outputs.kind == 'git'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential clang cmake \
              libclang-dev libssl-dev pkg-config protobuf-compiler

      - name: Install ai-dynamo
        # Pass the resolved SHA (not the ref) so git+...@<sha> URLs are
        # cache-keyable by pip -- refs like `main` would otherwise look
        # identical across upstream moves and serve stale wheels.
        run: ./scripts/install-dynamo.sh "${{ steps.resolve.outputs.sha }}"

      - name: Install echo_backend with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -v
